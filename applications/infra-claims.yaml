apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: infra-claims
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/parimal5/crossplane-iac-ops.git
    targetRevision: main
    path: infra/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
