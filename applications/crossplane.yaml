# Goal: ArgoCD Application to install Crossplane into the cluster
# This application uses the Crossplane Helm chart from the official chart repo
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: crossplane
  namespace: argocd

spec:
  project: default

  # source: chart location for Crossplane itself
  source:
    repoURL: https://charts.crossplane.io/stable
    chart: crossplane
    targetRevision: 1.15.0

    helm:
      releaseName: crossplane

  # destination: install Crossplane into the cluster namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system

  # syncPolicy: automated keeps Crossplane installed and updated from Git
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
