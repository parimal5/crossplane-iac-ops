apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: providers
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/parimal5/crossplane-iac-ops.git
    targetRevision: main
    path: crossplane/providers

  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
